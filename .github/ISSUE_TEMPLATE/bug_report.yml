name: Bug report
description: Something is broken or behaving unexpectedly in WristAssistant.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: issue
    attributes:
      label: What's the issue?
      description: Describe what's happening.
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: Logs, screenshots, or screen recordings
      description: Drag files in to attach.
